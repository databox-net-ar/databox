name: databox

services:
  databox:
    container_name: databox-apache
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${DATABOX_APP_PORT}:80"
    volumes:
      - ./cloud:/var/www/html
      - ./env.php:/var/www/env.php:ro
      - ./.env.development:/var/www/.env.development:ro
    environment:
      APP_ENV: development
    depends_on:
      - db
    restart: unless-stopped

  db:
    container_name: databox-mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: databox_dev
    ports:
      - "${DATABOX_DB_PORT}:3306"
    volumes:
      - databox-db-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  databox-db-data:
    name: databox-db-data
